spring:
  application:
    name: file-parser-api
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
      show-sql: true
      jdbc:
        batch_size: 100
        batch_versioned_data: true
      order_inserts: true
      order_updates: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: INFO
    org.lsandoval.fileparser: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours in ms

auth:
  jwt:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /file-parser/api

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Per-format record locators: file type -> file extension -> locator value.
# The locator tells each parser where the records live: Excel = sheet name,
# JSON = property holding the array, XML = repeating record element.
# An empty value means "format default" (first sheet / top-level array).
file-parser:
  locators:
    RESERVATION:
      xlsx: ""
      csv: ""
      json: ""
      xml: "reservation"
    PAYMENT:
      xlsx: "M-pago"
      csv: ""
      json: "M-pago"
      xml: "M-pago"